name: Deploy Task Manager API

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker images
        run: |
          docker build -t taskmanager-api .

      - name: Test API (simple check)
        run: |
          docker run -d --name test-api -p 3000:3000 taskmanager-api
          sleep 10
          curl http://localhost:3000/health || echo "Health check failed, but continuing"
          docker stop test-api
          docker rm test-api